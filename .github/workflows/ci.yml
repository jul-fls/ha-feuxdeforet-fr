name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_test.txt

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest -q --cov

  home-assistant-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Home Assistant test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_ha_test.txt

      - name: Home Assistant config flow tests
        run: pytest -q tests_ha
